<h2>Rooms</h2>

<ov-dynamic-grid [maxColumns]="2" [withHeader]="true" [gutter]="'10px'" [layoutMode]="'grid'">
	<!-- Custom Header-->
	<div header>
		<button mat-flat-button color="primary" (click)="createRoom()">
			<mat-icon class="icon-left">add</mat-icon>
			Create Room
		</button>
	</div>

	<mat-list class="grid-item" [attr.data-span]="2">
		@for (item of createdRooms; track item) {
			<mat-list-item (click)="onRoomClicked(item)" class="list-item">
				<div class="item-content">
					<h3 class="item-title">{{ item.roomId }}</h3>
					<!-- <div class="item-details">
						<mat-icon class="icon">people</mat-icon>
						<span>{{ item.peopleCount }} people</span>
						<mat-icon class="icon">timer</mat-icon>
						<span>{{ item.lockedText }}</span>
						<span class="expires">Expires {{ item.expiryDate | date: 'dd/MM/yyyy' }}</span>
					</div> -->
				</div>
			</mat-list-item>
		}
	</mat-list>

	<!-- Recording Toggle -->
	<ov-toggle-card
		[title]="'Recording'"
		[description]="'Allow record your rooms for later use'"
		[icon]="'radio_button_checked'"
		[iconBackgroundColor]="'#e23e3e'"
		[cardBackgroundColor]="'#ffffff'"
		[toggleValue]="recordingEnabled"
		(onToggleValueChanged)="onRecordingToggle($event)"
	>
	</ov-toggle-card>
	<!-- Broadcasting Toggle -->
	<ov-toggle-card
		[title]="'Broadcasting'"
		[description]="'Allow broadcast your rooms to the world'"
		[icon]="'sensors'"
		[iconBackgroundColor]="'#5903ca'"
		[cardBackgroundColor]="'#ffffff'"
		[toggleValue]="broadcastingEnabled"
		(onToggleValueChanged)="onBroadcastingToggle($event)"
	>
	</ov-toggle-card>

	<!-- Chat Toggle -->
	<ov-toggle-card
		[title]="'Chat'"
		[description]="'Allow participants to communicate via chat'"
		[icon]="'message'"
		[iconBackgroundColor]="'#598eff'"
		[cardBackgroundColor]="'#ffffff'"
		[toggleValue]="chatEnabled"
		(onToggleValueChanged)="onChatToggle($event)"
	>
	</ov-toggle-card>

	<ov-toggle-card
		[title]="'Backgrounds'"
		[description]="'Allow participants to change their backgrounds'"
		[icon]="'blur_on'"
		[iconBackgroundColor]="'#444444'"
		[cardBackgroundColor]="'#ffffff'"
		[toggleValue]="backgroundsEnabled"
		(onToggleValueChanged)="onVirtualBackgroundToggle($event)"
	>
	</ov-toggle-card>
</ov-dynamic-grid>
