openapi: 3.0.1
info:
    version: v1
    title: OpenVidu Embedded API
    description: 'OpenVidu Embedded API'
    termsOfService: https://openvidu.io/conditions/terms-of-service/
    contact:
        name: OpenVidu
        email: commercial@openvidu.io
        url: https://openvidu.io/support/

servers:
    - url: http://localhost:6080/v1/embedded/api
      description: Development server

tags:
    - name: EmbeddedAuth
      description: Endpoints for generating authentication tokens for embedded sessions

paths:
    /token:
        post:
            operationId: generateToken
            summary: Generate an embedded authentication token
            # description: Returns a JWT token for authentication.
            tags:
                - EmbeddedAuth
            requestBody:
                $ref: '#/components/requestBodies/EmbeddedTokenOptions'

            responses:
                '200':
                    description: Token successfully generated
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                                        example: 'eyJhbGciOiJIUzI1...'
                '400':
                    description: Invalid credentials
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '415':
                    description: 'Unsupported Media Type'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '500':
                    description: Internal server error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'

components:
    requestBodies:
        EmbeddedTokenOptions:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/EmbeddedTokenOptions'
            description: Options for generating a token

    schemas:
        EmbeddedTokenOptions:
            type: object
            required:
                - participantName
                - roomName
            properties:
                participantName:
                    type: string
                    example: 'OpenVidu'
                    description: 'The name of the participant.'
                roomName:
                    type: string
                    example: 'OpenViduEmbedded'
                    description: 'The name of the room the participant will join.'
                permissions:
                    $ref: '#/components/schemas/EmbeddedParticipantPermissions'
        EmbeddedParticipantPermissions:
            type: object
            properties:
                canRecord:
                    type: boolean
                    default: true
                    example: true
                    description: 'If true, the participant can record the session.'
                canChat:
                    type: boolean
                    default: true
                    example: true
                    description: 'If true, the participant can chat in the session.'
        Error:
            type: object
            required:
                - code
                - message
            properties:
                code:
                    type: integer
                    format: int32
                message:
                    type: string
